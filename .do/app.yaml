# DigitalOcean App Platform deployment spec
# Deploy with: doctl apps create --spec .do/app.yaml
# Or import via: https://cloud.digitalocean.com/apps/new
#
# Before deploying:
#   1. Push this repo to GitHub (repo already set below)
#   2. Set all SECRET env vars in the DO dashboard (DATABASE_URL, REDIS_URL, etc.)
#      DATABASE_URL → the existing transitdb cluster connection string
#      REDIS_URL    → the Azure Redis connection string (rediss://...)
#
# This spec references the EXISTING managed databases — it does NOT
# provision new ones. Attach the existing "nairobi-transit-db" cluster
# via the DO dashboard after creating the app.
#
# Region: fra (Frankfurt) — closest major region to Nairobi
#
# ── Routing architecture ──────────────────────────────────────────────
# The DO ingress routes /api/*, /pay/*, and /health directly to the Rust
# "api" service.  Everything else goes to the Next.js "web" service.
#
# Previous approach used Next.js server-side rewrites to proxy /api/**
# to the Rust service, but Next.js rewrites() are evaluated at BUILD time
# and INTERNAL_API_URL (a DO runtime binding) isn't available during build,
# causing the proxy destination to bake as http://localhost:8080 → 404.
#
# The Next.js rewrites in next.config.ts are kept for local development
# (where localhost:8080 is the correct Rust server address).
# ─────────────────────────────────────────────────────────────────────

name: nairobi-transit
region: fra

services:
  # ── Rust/Axum API ─────────────────────────────────────────────
  - name: api
    dockerfile_path: server/Dockerfile
    source_dir: server          # relative path — no leading slash
    github:
      repo: lawravasco2207/nairobi-transit
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
    envs:
      # ── Set these as SECRETS in the DO dashboard ───────────────
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: DARAJA_CONSUMER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DARAJA_CONSUMER_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DARAJA_SHORTCODE
        scope: RUN_TIME
        type: SECRET
      - key: DARAJA_PASSKEY
        scope: RUN_TIME
        type: SECRET
      - key: AT_USERNAME
        scope: RUN_TIME
        type: SECRET
      - key: AT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      # ── Computed from the app domain (no secret needed) ────────
      - key: DARAJA_BASE_URL
        scope: RUN_TIME
        value: https://sandbox.safaricom.co.ke
      # QR_BASE_URL must include the /pay path segment so the generated
      # QR URL resolves to /pay/<vehicle_id> on the public domain.
      - key: QR_BASE_URL
        scope: RUN_TIME
        value: https://nairobi-transit-ainty.ondigitalocean.app/pay
      - key: DARAJA_CALLBACK_URL
        scope: RUN_TIME
        value: https://nairobi-transit-ainty.ondigitalocean.app/api/daraja/callback

  # ── Next.js frontend ──────────────────────────────────────────
  - name: web
    dockerfile_path: frontend/Dockerfile
    source_dir: frontend        # relative path — no leading slash
    github:
      repo: lawravasco2207/nairobi-transit
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    # build_command is for buildpack deployments; Dockerfile builds must omit it.
    envs:
      # NEXT_PUBLIC_API_URL is empty so the browser uses same-origin relative
      # URLs.  All /api/* requests then reach the Next.js server which proxies
      # them to the Rust service via INTERNAL_API_URL (see next.config.ts).
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ""
      # Private-network URL of the Rust "api" component, injected at runtime
      # by DO App Platform.  Used by the Next.js proxy rewrites so they can
      # reach the Rust service without going over the public internet.
      - key: INTERNAL_API_URL
        scope: RUN_TIME
        value: ${api.PRIVATE_URL}

# Note: No databases section — the existing DO PostgreSQL cluster
# (nairobi-transit-db) and Azure Redis are referenced via SECRET env vars.
# To attach the existing cluster in the DO dashboard:
#   Apps → your app → Settings → App-Level Environment Variables
#   Paste the full pg connection string as DATABASE_URL (type: Secret)

ingress:
  rules:
    # ── All API calls → Rust service directly ────────────────────
    # Next.js rewrites() are evaluated at *build* time, but
    # INTERNAL_API_URL is only available at runtime (DO component
    # binding).  This means the proxy destination gets baked as
    # http://localhost:8080 which doesn't exist in the frontend
    # container → 404.  Routing /api/ at the ingress level avoids
    # the problem entirely.  The Next.js rewrites still work for
    # local development where localhost:8080 is correct.
    - component:
        name: api
      match:
        path:
          prefix: /api/
    # ── Passenger pay page (HTML rendered by Rust) ───────────────
    - component:
        name: api
      match:
        path:
          prefix: /pay/
    # ── Health check ─────────────────────────────────────────────
    - component:
        name: api
      match:
        path:
          prefix: /health
    # ── Everything else → Next.js frontend ───────────────────────
    - component:
        name: web
      match:
        path:
          prefix: /
